services:
  # ──────────────────────────────────────────────
  # Next.js Application (ffplayout UI + API)
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffplayout-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/custom.db
      - PORT=3000
      - REALTIME_CONTROL_URL=http://realtime:3006
      - CADDYFILE_PATH=/data/Caddyfile
      - CADDY_ADMIN_URL=http://caddy:2019
    volumes:
      - app-data:/data          # SQLite database persistence
      - app-media:/app/public/media    # Media files storage
      - app-logos:/app/public/logos    # Logo overlay files storage
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/system"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - broadcast

  # ──────────────────────────────────────────────
  # Realtime Service (Socket.IO)
  # ──────────────────────────────────────────────
  realtime:
    build:
      context: ./mini-services/realtime-service
      dockerfile: Dockerfile
    container_name: ffplayout-realtime
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '16'
          memory: 16G
    environment:
      - PORT=3005
      - CONTROL_PORT=3006
      - APP_API_URL=http://app:3000/api
      - MEDIA_DIR=/srv/media
      - LOGOS_DIR=/srv/logos
    volumes:
      - app-media:/srv/media:ro
      - app-logos:/srv/logos:ro
    expose:
      - "3005"
      - "3006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/socket.io/?EIO=4&transport=polling"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - broadcast

  # ──────────────────────────────────────────────
  # Caddy Reverse Proxy
  # ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ffplayout-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile  # Initial Caddyfile (writable for reload)
      - caddy-data:/data
      - caddy-config:/config
      - app-media:/srv/media:ro
      - app-logos:/srv/logos:ro
    depends_on:
      app:
        condition: service_healthy
      realtime:
        condition: service_healthy
    networks:
      - broadcast

volumes:
  app-data:
    driver: local
  app-media:
    driver: local
  app-logos:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  broadcast:
    driver: bridge